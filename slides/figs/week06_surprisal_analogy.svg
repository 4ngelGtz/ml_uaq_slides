<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260">
  <style>
    .axis { stroke: #4b5563; stroke-width: 1.5; }
    .bar-prob { fill: #3b82f6; }
    .bar-surp { fill: #ef4444; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #111827; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: bold; fill: #111827; }
    .small { font-size: 11px; fill: #374151; }
    .panel-title { font-weight: bold; font-size: 13px; }
  </style>

  <!-- Global title -->
  <text x="360" y="22" text-anchor="middle" class="title">
    Probabilidad vs sorpresa (surprisal)
  </text>

  <!-- Left panel: probabilities -->
  <text x="180" y="46" text-anchor="middle" class="panel-title">
    (a) Probabilidad de los eventos
  </text>

  <!-- Axes for probabilities -->
  <line x1="60" y1="210" x2="300" y2="210" class="axis"/>
  <line x1="60" y1="80" x2="60" y2="210" class="axis"/>

  <!-- Y-axis labels (probability) -->
  <text x="30" y="150" text-anchor="middle" class="label" transform="rotate(-90 30 150)">
    Probabilidad p(x)
  </text>

  <!-- X labels (events) -->
  <text x="120" y="228" text-anchor="middle" class="label">Evento frecuente</text>
  <text x="210" y="228" text-anchor="middle" class="label">Evento raro</text>
  <text x="270" y="228" text-anchor="middle" class="label">Evento muy raro</text>

  <!-- Probability bars (heights proportional to p) -->
  <!-- Frequent: p = 0.8 -->
  <rect x="105" y="110" width="30" height="100" class="bar-prob"/>
  <text x="120" y="104" text-anchor="middle" class="small">p=0.8</text>

  <!-- Rare: p = 0.15 -->
  <rect x="195" y="185" width="30" height="25" class="bar-prob"/>
  <text x="210" y="179" text-anchor="middle" class="small">p=0.15</text>

  <!-- Very rare: p = 0.05 -->
  <rect x="255" y="200" width="30" height="10" class="bar-prob"/>
  <text x="270" y="194" text-anchor="middle" class="small">p=0.05</text>

  <!-- Right panel: surprisal -->
  <text x="540" y="46" text-anchor="middle" class="panel-title">
    (b) Sorpresa I(x) = log‚ p(x)
  </text>

  <!-- Axes for surprisal -->
  <line x1="420" y1="210" x2="660" y2="210" class="axis"/>
  <line x1="420" y1="80" x2="420" y2="210" class="axis"/>

  <!-- Y-axis labels (surprisal) -->
  <text x="390" y="150" text-anchor="middle" class="label" transform="rotate(-90 390 150)">
    Sorpresa I(x)
  </text>

  <!-- X labels (events, same order) -->
  <text x="480" y="228" text-anchor="middle" class="label">Evento frecuente</text>
  <text x="570" y="228" text-anchor="middle" class="label">Evento raro</text>
  <text x="630" y="228" text-anchor="middle" class="label">Evento muy raro</text>

  <!-- Surprisal bars (approx values) -->
  <!-- Frequent: I H 0.32 bits (log2 0.8) -->
  <rect x="465" y="195" width="30" height="15" class="bar-surp"/>
  <text x="480" y="189" text-anchor="middle" class="small">H0.32</text>

  <!-- Rare: I H 2.74 bits (log2 0.15) -->
  <rect x="555" y="115" width="30" height="95" class="bar-surp"/>
  <text x="570" y="109" text-anchor="middle" class="small">H2.74</text>

  <!-- Very rare: I H 4.32 bits (log2 0.05) -->
  <rect x="615" y="90" width="30" height="120" class="bar-surp"/>
  <text x="630" y="84" text-anchor="middle" class="small">H4.32</text>

  <!-- Caption at bottom -->
  <text x="360" y="248" text-anchor="middle" class="small">
    Eventos muy improbables tienen poca probabilidad pero mucha sorpresa (información).
  </text>
</svg>

