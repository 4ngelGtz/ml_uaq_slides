<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260">
  <style>
    .box { fill: #f9fafb; stroke: #111827; stroke-width: 2; rx: 6; ry: 6; }
    .noise { fill: #fef3c7; stroke: #92400e; stroke-width: 2; rx: 6; ry: 6; }
    .arrow { stroke: #111827; stroke-width: 2.2; marker-end: url(#arrowhead); }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #111827; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #111827; }
    .small { font-size: 11px; fill: #374151; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" class="title">
    Modelo de comunicación de Shannon
  </text>

  <!-- Source -->
  <rect x="40" y="80" width="110" height="80" class="box"/>
  <text x="95" y="110" text-anchor="middle" class="label">Fuente</text>
  <text x="95" y="130" text-anchor="middle" class="small">(información)</text>

  <!-- Transmitter -->
  <rect x="180" y="80" width="120" height="80" class="box"/>
  <text x="240" y="110" text-anchor="middle" class="label">Transmisor</text>
  <text x="240" y="130" text-anchor="middle" class="small">codifica mensaje ’ seńal</text>

  <!-- Channel -->
  <rect x="340" y="80" width="120" height="80" class="box"/>
  <text x="400" y="110" text-anchor="middle" class="label">Canal</text>
  <text x="400" y="130" text-anchor="middle" class="small">(medio físico)</text>

  <!-- Receiver -->
  <rect x="500" y="80" width="120" height="80" class="box"/>
  <text x="560" y="110" text-anchor="middle" class="label">Receptor</text>
  <text x="560" y="130" text-anchor="middle" class="small">seńal ’ mensaje</text>

  <!-- Destination -->
  <rect x="640" y="80" width="70" height="80" class="box"/>
  <text x="675" y="110" text-anchor="middle" class="label">Destino</text>
  <text x="675" y="130" text-anchor="middle" class="small">usuario</text>

  <!-- Noise -->
  <rect x="360" y="180" width="80" height="50" class="noise"/>
  <text x="400" y="200" text-anchor="middle" class="label">Ruido</text>
  <text x="400" y="216" text-anchor="middle" class="small">interferencias</text>

  <!-- Arrows -->
  <line x1="150" y1="120" x2="180" y2="120" class="arrow"/>
  <line x1="300" y1="120" x2="340" y2="120" class="arrow"/>
  <line x1="460" y1="120" x2="500" y2="120" class="arrow"/>
  <line x1="620" y1="120" x2="640" y2="120" class="arrow"/>

  <!-- Noise arrow into channel -->
  <line x1="400" y1="180" x2="400" y2="160" class="arrow"/>

  <!-- Annotations -->
  <text x="115" y="70" text-anchor="middle" class="small">mensaje</text>
  <text x="260" y="70" text-anchor="middle" class="small">seńal codificada</text>
  <text x="400" y="70" text-anchor="middle" class="small">seńal con ruido</text>
  <text x="560" y="70" text-anchor="middle" class="small">mensaje recibido</text>
</svg>

